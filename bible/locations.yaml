locations:

  - id: LOC-001
    name: "ヴァルブレイズ領"
    type: "territory"
    region: "辺境"
    summary: "ガレット・ヴァルブレイズが統治する辺境の領地。農業が基盤。王都から遠く自治権が強い。"
    notes:
      - "隣領との税率比較がS01の発端"
      - "領民はガレットを慕っている（本人は気づいていない）"

  - id: LOC-002
    name: "ヴァルブレイズ領主館"
    type: "building"
    parent: "LOC-001"
    summary: "ガレットの居城兼執務所。石造りの中規模な館。S01の冒頭場面（執務室・廊下・厨房）がここに位置する。"
    notes:
      - "クロエが働く場所"
      - "ガレットの執務室、廊下、厨房が登場場面として確立済み（manuscript/S01.md）"

  - id: LOC-003
    name: "領内の孤児院"
    type: "institution"
    parent: "LOC-001"
    summary: "ヴァルブレイズ領内の孤児院。教会系の慈善施設でシスターが運営する。ガレットが密かに支援している（本人はそれを悪の布石だと思っている）。"
    notes:
      - "第二幕エピソードのひとつに関連する可能性あり"
      - "シスター（脇役）の活動拠点"

  - id: LOC-004
    name: "王都テルハイン"
    type: "city"
    region: "王都"
    summary: "アルデニア王国の首都。国王・王女エレオノーラが居住し、王国法廷が置かれる。第三幕の主舞台。"
    notes:
      - "第一幕：ガレットが召喚状を受け取り、向かう目的地"
      - "第三幕の裁判はここで行われる"

  - id: LOC-005
    name: "王国法廷"
    type: "building"
    parent: "LOC-004"
    summary: "アルデニア王国の最高司法機関。第三幕の裁判シーンの主舞台。公開の法廷で審問が行われる。"
    notes:
      - "審問官ドルランが審理を主導する場所（CHAR-005）"
      - "証言台、傍聴席、審問官席、被審問者の立ち位置が存在する"
      - "エレオノーラが王女として同席できる場"

  - id: LOC-007
    name: "バルゴア伯爵領"
    type: "territory"
    region: "辺境"
    summary: "ヴァルブレイズ領の隣領。不作続きで領庫が傾き、税率を二割引き上げた。ガレットの「悪の経営（減税）」の対比として機能する。"
    notes:
      - "manuscript/S03-1.md で確定。隣領の増税がガレットの減税の発端"
      - "領主はバルゴア伯爵（未登場・名のみ）"

  - id: LOC-006
    name: "貴族学院"
    type: "institution"
    region: "王都近郊"
    summary: "アルデニア王国の貴族子弟が在籍する教育機関。寄宿舎あり。ガレット・ヴィオラが在籍する。"
    notes:
      - "第二幕エピソード2（尾行）の舞台"
      - "ヴィオラがガレットのライバルを自任している場所"
