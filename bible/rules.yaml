world_rules:

  magic:
    - rule: "魔法は才能と訓練の両方が必要な技術。全員が使えるわけではない"
    - rule: "魔法の効果は術者の意図どおりに発動する。魔法は中立であり、善悪を自動変換しない"
    - rule: "魔法は「悪行→善行」変換のからくりに使わない（ガレットの人格の問題であることを明確にするため）"
    - rule: "ガレットの魔法力は平均寄り。派手な悪の演出には使いにくい"
    - rule: "魔法は情報伝達・治癒・戦闘などに汎用的に使われるが、本作では背景扱い。魔法の詳細設定は積み増ししない"

  law_and_court:
    - rule: "王国法廷は最高司法機関。悪逆な貴族を審問できる"
    - rule: "審問には正式な召喚状が必要。発行には王家・法廷の承認が要る"
    - rule: "貴族の爵位剥奪・領地没収には、証拠と複数証人の証言が必要"
    - rule: "証言者の主観的評価も証拠として認められる（コメディの土台：善行証言が『悪の証拠』として提出される）"
    - rule: "審問官は中立的な立場で審理を進める義務がある。私情を挟んではならない"

  social:
    - rule: "貴族の税率設定は領主の裁量内。ただし過度な搾取は審問対象になりうる"
    - rule: "没落貴族はその身分を失い、他家に仕えることができる"
    - rule: "貴族子弟は貴族学院で教育を受けるのが慣習"
    - rule: "孤児院は慈善組織・教会が運営し、領主の庇護を受けることが多い"

  comedy_constraints:
    - rule: "ガレットは実際に人を傷つけることができない（コメディの根本的制約）"
    - rule: "悪いことをしようとして善行になる源泉はガレットの人格・性質のみ。魔法・呪い・神の意志などは関与しない"
    - rule: "世界の仕組みをシリアスに膨らませない。謎や大陰謀は設定しない"
