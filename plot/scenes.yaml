# Scene 骨格（全11シーン）
# 視点フォーマット: 基本ガレット一人称。他者視点は「◇」で区切って挿入(DECISION-009)。
# 重要: ガレットが「ずっとバレていた」と気づくのは終盤(S07-S08)のみ。それ以前は本人に悟らせない。
# 登場人物: ガレット(CHAR-001) クロエ(002) ヴィオラ(003) エレオノーラ(004)
#           ドルラン=審問官(005) アルダ=筆頭家令(006) イレーヌ=孤児院シスター(007)

scenes:
  # ===== 第一幕: 裁判直前 =====
  - id: S01
    act: act1
    title: 召喚状
    status: drafted   # manuscript/S01.md
    pov: ガレット (+ ◇クロエ)
    summary: 王国法廷からの審問召喚状が届く。ガレットは「悪が認められた」と歓喜。クロエとの掛け合いで減税エピソードがチラ見えする。
    purpose: 主人公の声・勘違い構造・世界観を確立。読者>主人公の情報差を冒頭で立てる。
    conflict: ガレットの「悪の自負」と、客観的事実(善行)のズレ。
    reveal_to_reader: ガレットが悪を演じていること/周囲はバレていること(クロエの独白)。
    reveal_to_garrett: なし(クロエの本音は聞かせない)。
    hook: 「なぜこんな審問になったのか」という問い。

  - id: S02
    act: act1
    title: 出立
    status: drafted   # manuscript/S02.md
    pov: ガレット (+ ◇アルダ)
    summary: 裁判のため王都テルハインへ発つ朝。筆頭家令アルダや使用人が見送る。意気揚々のガレットと、無実を晴らそうと先回りで動く周囲。回想(第二幕)への導線を置く。
    purpose: 第一幕を締め、過去編へ橋渡し。アルダ(黒子)とヴァルブレイズ領を提示。
    conflict: 「凱旋のつもり」のガレット vs 「守らねば」と動く周囲。
    reveal_to_reader: 周囲が裁判を本気で案じている=ガレットの善性が愛されている事実(◇アルダ)。
    foreshadow: 各ヒロインが王都へ向かう/証言する伏線。
    note: ここから第二幕(過去編)へフラッシュバック。

  # ===== 第二幕: 過去編(各ヒロイン2話・裁判の証拠が出揃う) =====
  # --- クロエ編 ---
  - id: S03-1
    act: act2
    title: 悪の経営（クロエ・コメディ回）
    status: drafted   # manuscript/S03-1.md
    pov: ガレット (+ ◇クロエ / ◇イレーヌor領民)
    summary: ガレットが「限界まで搾取する」つもりで減税・民の抱き込みを実行。結果、領民に感謝される。S01で言及された減税の全貌。
    purpose: 「悪行→善行」の基本パターンを本格提示。
    conflict: 悪の経営を気取るガレット vs 実際に救われる領民。
    payoff_setup: 裁判で領民・イレーヌが「税のおかげで助かった」と証言する伏線(S07)。
    pattern: 悪事を企図→形が変わる→善行化→周囲感謝→ガレット落ち込む。

  - id: S03-2
    act: act2
    title: 拾われた日（クロエ・掘り下げ回）
    status: drafted   # manuscript/S03-2.md
    pov: ◇クロエ主体 (+ ガレット)
    summary: クロエの没落・ヴァルブレイズ家に拾われた過去と、なぜここまで崇拝するのか。日常の小事件でガレットを侮辱する者への過剰な敵意(執着の重さ)が滲む。
    purpose: クロエの掘り下げ。崇拝の出所と重い執着(ヤンデレ)を読者に提示。ギャグの反復を避け関係性を深める。
    conflict: 拾われた身という負い目 vs 「ただ傍に居たい」という本心。
    reveal_to_reader: クロエの傷とtrue_need(SECRET-CHAR002-01)。
    payoff_setup: 裁判でクロエが毒舌のまま善行を全部バラす土台(S07)。

  # --- ヴィオラ編 ---
  - id: S04-1
    act: act2
    title: 学園（ヴィオラ・設定回）
    status: drafted   # manuscript/S04-1.md
    pov: ガレット (+ ◇ヴィオラ / 学園の生徒の目線)
    summary: 貴族学院という公の舞台での、悪名を演じるガレットと勝気なヴィオラの対立。周囲の目に映る「2人の姿」。ヴィオラが「弱みを握ってやる」と尾行を決意する。
    purpose: ヴィオラと学園を提示。公の顔(対立)を先に見せ、次話の素顔とのギャップを作る。声(アタシ/苛烈)の実地。
    conflict: ライバルとして勝ちたいヴィオラ vs 悪名を演じるガレット。
    foreshadow: 尾行の動機形成。
    note: 公の顔→次話で隠れた素顔、の落差設計。

  - id: S04-2
    act: act2
    title: 尾行（ヴィオラ・コメディ＋恋落ち回）
    status: drafted   # manuscript/S04-2.md
    pov: ヴィオラ主体(他者視点エピソード) (+ ガレットの素の言動)
    summary: 弱みを握ろうと尾行したヴィオラが、目撃するのは素の善行ばかり。素のガレットを見て惚れていくが、ライバルとしてのプライドで認められない。
    purpose: 「外から見たガレット」の善性と、ヴィオラの恋落ち+葛藤を描く。
    conflict: 弱みを暴きたい/惚れを認めたくないヴィオラ vs どこを切っても善人なガレット。
    reveal_to_reader: ヴィオラが惚れる過程と、認めないプライド(SECRET-CHAR003-01)。
    payoff_setup: 裁判でヴィオラが対抗心から善行を喋り倒す伏線(S07)。

  # --- エレオノーラ編 ---
  - id: S05-1
    act: act2
    title: 救出（エレオノーラ・事件回）
    status: drafted   # manuscript/S05-1.md
    pov: ガレット (+ ◇エレオノーラ)
    summary: 辺境を視察に訪れた王女エレオノーラ一行が魔物に襲われる。ガレットが身を挺して命がけで守る。エレオノーラは負傷し気を失うが、夢うつつでガレットの本音の独り言(無私の優しさ)を聞いてしまう。
    purpose: ガレットの本質的善性を最も鮮烈に提示。事件(魔物襲撃)をしっかり描く。エレオノーラの初恋の発火点。最強の証拠(切り札)の仕込み。
    setting: 王女は辺境視察中(辺境=魔物が出る国境地帯という世界設定と整合)。
    conflict: 「手駒を失うところだった」と取り繕うガレット vs 本音を聞いてしまったエレオノーラ。
    reveal_to_reader: エレオノーラがガレットの本音を聞いた事実(◇)=切り札の仕込み。
    reveal_to_garrett: 聞かれていたことに気づかない。
    payoff_setup: 終盤(S08)でエレオノーラが「あの言葉」を決定的証言として出す伏線。

  - id: S05-2
    act: act2
    title: 切り札（エレオノーラ・掘り下げ回）
    status: drafted   # manuscript/S05-2.md
    pov: ◇エレオノーラ主体
    summary: 救出後、王女が動き出す。完璧な仮面の下で初恋が制御不能になり、無実証明の準備と権力での接近(婚約話の布石)を始める。聞いた「あの言葉」を切り札として温存する決意。
    purpose: エレオノーラの掘り下げ。権力暴走型ヤンデレの提示。S08最大の伏線を固める。
    conflict: 公正な裁き手の責務 vs ガレットだけを救いたい私情。
    reveal_to_reader: エレオノーラが裁判を無実証明の場に誘導しようとしている裏の意図。
    payoff_setup: S08の切り札証言。

  # ===== 三つ巴パート(現在に復帰。回想明け〜裁判直前。DECISION-014) =====
  # 三つ巴は過去編に置けない(ヒロインが揃うのは現在のみ)ため、回想明けの現在パートに新設。
  - id: SAN-1
    act: act3
    title: 王都の集結（三つ巴）
    status: drafted   # manuscript/SAN-1.md
    target_length: "約5,000〜6,000字"
    pov: ガレット (+ ◇三者牽制)
    summary: |
      王都テルハインの宿屋。ガレット＋クロエが到着し部屋を取ろうとしたら、ヴィオラが先に待ち構えている。
      さらにエレオノーラの使者が「王宮に部屋を用意した」と来訪。三者鉢合わせ。
      前半: 三人がそれぞれガレットの世話を焼こうとして衝突(コメディ・世話焼き合戦)。
      後半: ガレットが湯浴みに席を外した隙に、三者の空気が変わり本音の牽制が始まる(険悪ではなく意地の張り合い)。
    purpose: |
      三つ巴の本格始動。各ヒロインの声・ヤンデレの出方の対比を一場面で見せる。
      S02でアルダが放った早馬(学院の御令嬢＋あのお方)の回収。
      裁判への盛り上げと、読者へのキャラ再提示(過去編から現在復帰)。
    setting: 王都テルハインの宿屋。狭い空間で身分差が際立つ。
    conflict: ガレットの寵を巡るクロエ(隠す)×ヴィオラ(宣言)×エレオノーラ(権力)の三者の牽制。
    garrett_misread:
      chloe: "右腕(悪の懐刀として信頼)"
      viola: "宿敵が偵察に来た(学院のライバルが悪の情報を掴みに来たと警戒)"
      eleonora: "王家が俺を恐れて監視に来た(権力者の牽制と解釈)"
    structure:
      - beat: "王都到着・宿屋チェックイン"
        detail: "ガレットが意気揚々と宿屋に入る。クロエが淡々と荷を運ぶ。「悪の拠点にふさわしい」と満足。"
      - beat: "ヴィオラ登場"
        detail: "宿屋のロビーにヴィオラが腕を組んで待っている。「アンタ、ひとりで裁判に行くとか何考えてんの」。ガレットは「宿敵め、偵察に来たか」と警戒。"
      - beat: "エレオノーラの使者"
        detail: "王宮から使者が「殿下より、王宮に部屋をご用意しております」。ガレットは「王家が俺を監視下に置く気か」と解釈。クロエとヴィオラが互いを意識し始める。"
      - beat: "世話焼き合戦(コメディ)"
        detail: |
          三人がそれぞれガレットの世話を焼こうとして衝突。
          クロエ「お食事は私が」→ヴィオラ「アンタの料理なんか食わせられるわけ？」→エレオノーラの使者「王宮の料理人が」。
          ガレットは「部下どもが忠誠を競っている」程度に解釈。
      - beat: "ガレット退場→◇三者牽制"
        detail: |
          ガレットが湯浴みに行く。残された三人。
          空気が変わるが、険悪ではなく「同じ人を好きな者同士の意地の張り合い」。
          クロエ: 静かに「私が一番長くお傍にいます」(事実の提示)。
          ヴィオラ: 「長けりゃいいってもんじゃないでしょ」(対抗)。
          エレオノーラ: 穏やかに微笑みながら「わたくしには、あの方の本当の言葉を聞いた日がありますの」(切り札の匂わせ、ただし中身は言わない)。
          三者とも「あの人を守る」一点では一致。ただし誰が一番かは譲らない。
      - beat: "ガレット戻り・締め"
        detail: "ガレットが戻ると三人は何事もなかったように。「明日の裁判、覚悟しておけ」と悪ぶるガレットに三者三様の反応。"
    reveal_to_reader: 三人の恋敵関係の確定。エレオノーラが「何か」を握っている示唆(S08への伏線強化)。
    reveal_to_garrett: なし(恋にも牽制にも気づかない)。
    payoff_setup: SAN-2(裁判前夜)・S07(証言の競い合い)への人間関係の土台。
    note: |
      過去編(S03-S05)からの復帰。読者は各ヒロインの内面を知っているので、三者の言動の裏が全部読める。
      ガレットだけが何も分かっていない=コメディの構造がそのまま三つ巴に拡張。
      牽制は険悪にならないこと(DECISION-016)。意地の張り合い・プライドのぶつかり程度。

  - id: SAN-2
    act: act3
    title: 裁判前夜（三つ巴）
    status: drafted   # manuscript/SAN-2.md
    target_length: "約5,000〜6,000字"
    pov: ガレット (+ ◇三者決意)
    summary: |
      裁判前夜の宿。三人がガレット不在の間に「どう証言するか」作戦会議を始めるが方針が噛み合わない。
      そこへガレットが「明日こそ俺の悪が証明される！」と上機嫌で乱入し、会議は台無し。三人は絶句しつつ各自の決意を固める。
      エレオノーラの切り札は他の二人にも秘密のまま。
      締め: ガレットの独白→◇三者の決意→寝息を見守る余韻。
    purpose: |
      三つ巴の深掘り。三人の動機を裁判(S07/S08)の証言へ接続。
      ガレットの無自覚さを改めて強調し、「守らなきゃ」への収斂を描く。
      SAN-1(出会い・コメディ)との差別化: SAN-2は決意・裁判への橋渡し。
    setting: 宿屋の同じ部屋(前夜)。
    conflict: 「どう証言するか」の方針衝突 + ガレット乱入で台無し。
    structure:
      - beat: "作戦会議(三者の方針衝突)"
        detail: |
          ガレットが買い出しに出た隙に、三人が集まる。
          クロエ: 「事実を並べれば足ります。余計なことは不要です」(冷静・効率重視)
          ヴィオラ: 「アタシが一番アイツのこと分かってんの。任せなさいよ」(対抗心)
          エレオノーラ: 「わたくしに策がありますの。ご心配なく」(含み笑い・中身は言わない)
          クロエとヴィオラがエレオノーラの「策」を追及するが、エレオノーラは優雅にかわす。
      - beat: "方針の噛み合わなさ→呉越同舟"
        detail: |
          三者の方針はバラバラだが、「あの人を有罪にさせない」一点では一致。
          渋々ながら「それぞれのやり方でやる」と着地。
          ただし「誰の証言が一番効くか」は暗黙の競争として残る。
      - beat: "ガレット乱入"
        detail: |
          ガレットが上機嫌で戻ってくる。
          「聞け！ 明日の法廷で、俺はこう言ってやる。『すべて俺の仕業だ』と。ついに、本物の悪が証明される日だ！」
          三人、絶句。それぞれの反応:
          クロエ: 「……さようでございますか」(いつもの毒舌が出ない)
          ヴィオラ: 「……バカじゃないの」(声が小さい)
          エレオノーラ: 微笑んだまま、何も言わない。
          →三人とも「この人を守る」決意が固まる瞬間。
      - beat: "ガレットの独白(締め前半)"
        detail: |
          夜。ガレットが窓辺で月を見ながら、明日の裁判を思い描く。
          あの本の魔王のように、堂々と裁かれる自分。悪への純粋な憧れ。
          「見ていろ。明日こそ、俺は本物の悪になる」
      - beat: "◇三者の決意(締め後半)"
        detail: |
          ◇で視点切替。各ヒロインの内心を短く。
          クロエ: 寝息を立てるガレットを見て「この方の傍は、私の場所です」(静かな確認)
          ヴィオラ: 別室で拳を握り「アイツの本当を、アタシが証明してやる」(闘志)
          エレオノーラ: 王宮の窓辺で「明日、わたくしの全てを賭けますわ」(覚悟)
          最後に、ガレットの寝息と、それを見守るクロエの横顔で幕。
    reveal_to_reader: 三人の証言が競い合いになること。エレオノーラが秘密の「策」を持っていること(中身はS08まで温存)。
    reveal_to_garrett: なし。
    payoff_setup: S06(開廷)・S07(証言の競い合い)・S08(エレオノーラの切り札)への直接の導線。
    note: |
      SAN-1=コメディ寄り(世話焼き合戦)、SAN-2=決意寄り(裁判への助走)で差別化。
      ガレット乱入のビートが本作の核心: 「悪を夢見る無自覚な善人」を守ろうとする三者。
      牽制の温度はSAN-1同様、険悪にならないこと(DECISION-016)。

  # ===== 第三幕: 裁判 =====
  - id: S06
    act: act3
    title: 開廷
    status: drafted   # manuscript/S06.md
    pov: ガレット
    summary: 王国法廷で審問が始まる。主任審問官ドルランが断罪する気満々で「悪行」を列挙し始める。ガレットは「ついに悪が証明される」と意気揚々。
    purpose: 裁判の場とルール、相手役ドルランを提示。コメディの舞台装置を起動。現在時制に復帰。
    conflict: 断罪したいドルラン vs 断罪されたいガレット(目的が奇妙に一致)。

  - id: S07
    act: act3
    title: 証言の連鎖
    status: drafted   # manuscript/S07.md
    pov: ガレット
    summary: 提示される「悪行」のたびに当事者(イレーヌ・領民/クロエ/ヴィオラ等)が登場し感謝・賛美を述べる。ガレットは自ら悪を暴露しようとするが、家令アルダが絶妙にフォローして善行に歪める。ドルランは困り果てる。S03-S04が次々回収される。
    purpose: 第二幕の出来事を「あのときのやつだ」と気持ちよく回収。笑いのピーク。
    conflict: 自爆したいガレット vs 庇う面々(クロエ毒舌・ヴィオラ対抗心・アルダのフォロー) vs 困惑するドルラン。
    payoff: S03(重税/領民/イレーヌ) S04(尾行/ヴィオラ) の回収。クロエとヴィオラのライバル掛け合い。
    structure: 王国側の追及とガレットの自爆が混在(交互ではなく混合)。

  - id: S08
    act: act3
    title: 切り札と結末
    status: drafted   # manuscript/S08.md
    pov: ガレット
    summary: エレオノーラが温存していた「本音の独り言」を決定的証言として投下。ガレットの悪が完全崩壊し、ついに「ずっとバレていた」と気づく。「俺は悪だ!」と叫ぶが誰も信じない。三人のヒロインが彼を巡り修羅場、にぎやかに幕。
    purpose: カタルシス。気づきの山。Ending Spec の回収。
    conflict: 悪であろうとする最後の抵抗 vs 全員の温かい否定。
    payoff: S05(救出/エレオノーラの切り札)の回収。全伏線の収束。
    climax: ガレットの「ずっとバレていた」という気づき=本作唯一かつ最大の認知転換。
    ending: 「俺は悪だ!」→誰も信じない→三つ巴の修羅場→にぎやかで明るい幕(DECISION-004)。
    reader_payoff: 「やっと…!」+ 笑いながらじんわり温かい読後感。
