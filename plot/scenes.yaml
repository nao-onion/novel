# Scene 骨格（全11シーン）
# 視点フォーマット: 基本ガレット一人称。他者視点は「◇」で区切って挿入(DECISION-009)。
# 重要: ガレットが「ずっとバレていた」と気づくのは終盤(S07-S08)のみ。それ以前は本人に悟らせない。
# 登場人物: ガレット(CHAR-001) クロエ(002) ヴィオラ(003) エレオノーラ(004)
#           ドルラン=審問官(005) アルダ=筆頭家令(006) イレーヌ=孤児院シスター(007)

scenes:
  # ===== 第一幕: 裁判直前 =====
  - id: S01
    act: act1
    title: 召喚状
    status: drafted   # manuscript/S01.md
    pov: ガレット (+ ◇クロエ)
    summary: 王国法廷からの審問召喚状が届く。ガレットは「悪が認められた」と歓喜。クロエとの掛け合いで減税エピソードがチラ見えする。
    purpose: 主人公の声・勘違い構造・世界観を確立。読者>主人公の情報差を冒頭で立てる。
    conflict: ガレットの「悪の自負」と、客観的事実(善行)のズレ。
    reveal_to_reader: ガレットが悪を演じていること/周囲はバレていること(クロエの独白)。
    reveal_to_garrett: なし(クロエの本音は聞かせない)。
    hook: 「なぜこんな審問になったのか」という問い。

  - id: S02
    act: act1
    title: 出立
    status: planned
    pov: ガレット (+ ◇アルダ)
    summary: 裁判のため王都テルハインへ発つ朝。筆頭家令アルダや使用人が見送る。意気揚々のガレットと、無実を晴らそうと先回りで動く周囲。回想(第二幕)への導線を置く。
    purpose: 第一幕を締め、過去編へ橋渡し。アルダ(黒子)とヴァルブレイズ領を提示。
    conflict: 「凱旋のつもり」のガレット vs 「守らねば」と動く周囲。
    reveal_to_reader: 周囲が裁判を本気で案じている=ガレットの善性が愛されている事実(◇アルダ)。
    foreshadow: 各ヒロインが王都へ向かう/証言する伏線。
    note: ここから第二幕(過去編)へフラッシュバック。

  # ===== 第二幕: 過去編(各ヒロイン2話・裁判の証拠が出揃う) =====
  # --- クロエ編 ---
  - id: S03-1
    act: act2
    title: 悪の経営（クロエ・コメディ回）
    status: planned
    pov: ガレット (+ ◇クロエ / ◇イレーヌor領民)
    summary: ガレットが「限界まで搾取する」つもりで減税・民の抱き込みを実行。結果、領民に感謝される。S01で言及された減税の全貌。
    purpose: 「悪行→善行」の基本パターンを本格提示。
    conflict: 悪の経営を気取るガレット vs 実際に救われる領民。
    payoff_setup: 裁判で領民・イレーヌが「税のおかげで助かった」と証言する伏線(S07)。
    pattern: 悪事を企図→形が変わる→善行化→周囲感謝→ガレット落ち込む。

  - id: S03-2
    act: act2
    title: 拾われた日（クロエ・掘り下げ回）
    status: planned
    pov: ◇クロエ主体 (+ ガレット)
    summary: クロエの没落・ヴァルブレイズ家に拾われた過去と、なぜここまで崇拝するのか。日常の小事件でガレットを侮辱する者への過剰な敵意(執着の重さ)が滲む。
    purpose: クロエの掘り下げ。崇拝の出所と重い執着(ヤンデレ)を読者に提示。ギャグの反復を避け関係性を深める。
    conflict: 拾われた身という負い目 vs 「ただ傍に居たい」という本心。
    reveal_to_reader: クロエの傷とtrue_need(SECRET-CHAR002-01)。
    payoff_setup: 裁判でクロエが毒舌のまま善行を全部バラす土台(S07)。

  # --- ヴィオラ編 ---
  - id: S04-1
    act: act2
    title: 学園（ヴィオラ・設定回）
    status: planned
    pov: ガレット (+ ◇ヴィオラ / 学園の生徒の目線)
    summary: 貴族学院という公の舞台での、悪名を演じるガレットと勝気なヴィオラの対立。周囲の目に映る「2人の姿」。ヴィオラが「弱みを握ってやる」と尾行を決意する。
    purpose: ヴィオラと学園を提示。公の顔(対立)を先に見せ、次話の素顔とのギャップを作る。声(アタシ/苛烈)の実地。
    conflict: ライバルとして勝ちたいヴィオラ vs 悪名を演じるガレット。
    foreshadow: 尾行の動機形成。
    note: 公の顔→次話で隠れた素顔、の落差設計。

  - id: S04-2
    act: act2
    title: 尾行（ヴィオラ・コメディ＋恋落ち回）
    status: planned
    pov: ヴィオラ主体(他者視点エピソード) (+ ガレットの素の言動)
    summary: 弱みを握ろうと尾行したヴィオラが、目撃するのは素の善行ばかり。素のガレットを見て惚れていくが、ライバルとしてのプライドで認められない。
    purpose: 「外から見たガレット」の善性と、ヴィオラの恋落ち+葛藤を描く。
    conflict: 弱みを暴きたい/惚れを認めたくないヴィオラ vs どこを切っても善人なガレット。
    reveal_to_reader: ヴィオラが惚れる過程と、認めないプライド(SECRET-CHAR003-01)。
    payoff_setup: 裁判でヴィオラが対抗心から善行を喋り倒す伏線(S07)。

  # --- エレオノーラ編 ---
  - id: S05-1
    act: act2
    title: 救出（エレオノーラ・事件回）
    status: planned
    pov: ガレット (+ ◇エレオノーラ)
    summary: 辺境を視察に訪れた王女エレオノーラ一行が魔物に襲われる。ガレットが身を挺して命がけで守る。エレオノーラは負傷し気を失うが、夢うつつでガレットの本音の独り言(無私の優しさ)を聞いてしまう。
    purpose: ガレットの本質的善性を最も鮮烈に提示。事件(魔物襲撃)をしっかり描く。エレオノーラの初恋の発火点。最強の証拠(切り札)の仕込み。
    setting: 王女は辺境視察中(辺境=魔物が出る国境地帯という世界設定と整合)。
    conflict: 「手駒を失うところだった」と取り繕うガレット vs 本音を聞いてしまったエレオノーラ。
    reveal_to_reader: エレオノーラがガレットの本音を聞いた事実(◇)=切り札の仕込み。
    reveal_to_garrett: 聞かれていたことに気づかない。
    payoff_setup: 終盤(S08)でエレオノーラが「あの言葉」を決定的証言として出す伏線。

  - id: S05-2
    act: act2
    title: 切り札（エレオノーラ・掘り下げ回）
    status: planned
    pov: ◇エレオノーラ主体
    summary: 救出後、王女が動き出す。完璧な仮面の下で初恋が制御不能になり、無実証明の準備と権力での接近(婚約話の布石)を始める。聞いた「あの言葉」を切り札として温存する決意。
    purpose: エレオノーラの掘り下げ。権力暴走型ヤンデレの提示。S08最大の伏線を固める。
    conflict: 公正な裁き手の責務 vs ガレットだけを救いたい私情。
    reveal_to_reader: エレオノーラが裁判を無実証明の場に誘導しようとしている裏の意図。
    payoff_setup: S08の切り札証言。

  # ===== 第三幕: 裁判 =====
  - id: S06
    act: act3
    title: 開廷
    status: planned
    pov: ガレット
    summary: 王国法廷で審問が始まる。主任審問官ドルランが断罪する気満々で「悪行」を列挙し始める。ガレットは「ついに悪が証明される」と意気揚々。
    purpose: 裁判の場とルール、相手役ドルランを提示。コメディの舞台装置を起動。現在時制に復帰。
    conflict: 断罪したいドルラン vs 断罪されたいガレット(目的が奇妙に一致)。

  - id: S07
    act: act3
    title: 証言の連鎖
    status: planned
    pov: ガレット
    summary: 提示される「悪行」のたびに当事者(イレーヌ・領民/クロエ/ヴィオラ等)が登場し感謝・賛美を述べる。ガレットは自ら悪を暴露しようとするが、家令アルダが絶妙にフォローして善行に歪める。ドルランは困り果てる。S03-S04が次々回収される。
    purpose: 第二幕の出来事を「あのときのやつだ」と気持ちよく回収。笑いのピーク。
    conflict: 自爆したいガレット vs 庇う面々(クロエ毒舌・ヴィオラ対抗心・アルダのフォロー) vs 困惑するドルラン。
    payoff: S03(重税/領民/イレーヌ) S04(尾行/ヴィオラ) の回収。クロエとヴィオラのライバル掛け合い。
    structure: 王国側の追及とガレットの自爆が混在(交互ではなく混合)。

  - id: S08
    act: act3
    title: 切り札と結末
    status: planned
    pov: ガレット
    summary: エレオノーラが温存していた「本音の独り言」を決定的証言として投下。ガレットの悪が完全崩壊し、ついに「ずっとバレていた」と気づく。「俺は悪だ!」と叫ぶが誰も信じない。三人のヒロインが彼を巡り修羅場、にぎやかに幕。
    purpose: カタルシス。気づきの山。Ending Spec の回収。
    conflict: 悪であろうとする最後の抵抗 vs 全員の温かい否定。
    payoff: S05(救出/エレオノーラの切り札)の回収。全伏線の収束。
    climax: ガレットの「ずっとバレていた」という気づき=本作唯一かつ最大の認知転換。
    ending: 「俺は悪だ!」→誰も信じない→三つ巴の修羅場→にぎやかで明るい幕(DECISION-004)。
    reader_payoff: 「やっと…!」+ 笑いながらじんわり温かい読後感。
