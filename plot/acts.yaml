acts:
  - id: act1
    title: 裁判直前
    summary: 召喚状が届いてから裁判の朝まで。ガレットのキャラクターと世界観を確立する。
    pov: ガレット
    goal: 読者を引き込むフック。「なぜこんな裁判になったのか」という問いを立てる。
    scenes:
      - scene1_1

  - id: act2
    title: 過去編
    summary: ガレットが悪を目指してきた日々。裁判の証拠が出揃う。
    pov: ガレット（他者視点挿入あり）
    goal: 「悪行が善行になる」パターンを積み重ねる。「みんな知っている」を蓄積する。
    scenes:
      - scene2_1
      - scene2_2
      - scene2_3

  - id: act3
    title: 裁判
    summary: 第二幕の出来事が証拠として回収される。カタルシスへ。
    pov: ガレット
    goal: 笑いと感動を同時に届ける。「俺は悪だ！」と叫ぶが誰も信じない結末。
    scenes:
      - scene3_1
      - scene3_2
      - scene3_3
