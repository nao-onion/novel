acts:
  - id: act1
    title: 裁判直前
    summary: 召喚状が届いてから裁判の朝まで。ガレットのキャラクターと世界観を確立する。
    pov: ガレット
    goal: 読者を引き込むフック。「なぜこんな裁判になったのか」という問いを立てる。
    scenes:
      - S01   # 召喚状(drafted)
      - S02   # 出立

  - id: act2
    title: 過去編
    summary: ガレットが悪を目指してきた日々。各ヒロインを2話ずつ掘り下げ、裁判の証拠が出揃う。
    pov: ガレット（他者視点挿入あり）
    goal: 「悪行が善行になる」パターンを積み重ねつつ、各ヒロインを掘り下げる。「みんな知っている」を蓄積する。
    scenes:
      - S03-1   # 悪の経営(クロエ・コメディ)
      - S03-2   # 拾われた日(クロエ・掘り下げ)
      - S04-1   # 学園(ヴィオラ・設定)
      - S04-2   # 尾行(ヴィオラ・コメディ＋恋落ち)
      - S05-1   # 救出(エレオノーラ・事件)
      - S05-2   # 切り札(エレオノーラ・掘り下げ)

  - id: act3
    title: 裁判（現在に復帰）
    summary: 回想明け。三つ巴パートを挟み、裁判で第二幕の出来事が証拠として回収される。カタルシスへ。
    pov: ガレット（他者視点挿入あり）
    goal: 笑いと感動を同時に届ける。「俺は悪だ！」と叫ぶが誰も信じない結末。
    scenes:
      - SAN-1   # 王都の集結(三つ巴)
      - SAN-2   # 裁判前夜(三つ巴)
      - S06     # 開廷
      - S07     # 証言の連鎖
      - S08     # 切り札と結末
